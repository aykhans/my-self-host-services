global:
    scrape_interval: 10s

scrape_configs:
    - job_name: "node_exporter"
      scrape_interval: 2s
      static_configs:
          - targets: ["node_exporter:9100"]

    - job_name: "cadvisor"
      scrape_interval: 2s
      static_configs:
          - targets: ["cadvisor:8080"]

    - job_name: caddy
      scrape_interval: 2s
      static_configs:
          - targets: ["caddy:2019"]

    - job_name: crowdsec
      scrape_interval: 10s
      static_configs:
          - targets: ["crowdsec:6060"]

    - job_name: crowdsec_exporter
      scrape_interval: 30s
      static_configs:
          - targets: ["crowdsec_exporter:9100"]

    - job_name: storagebox_exporter
      scrape_interval: 60s
      static_configs:
          - targets: ["storagebox_exporter:9509"]
