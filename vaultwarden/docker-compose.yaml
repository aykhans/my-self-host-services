networks:
  caddy:
    name: caddy
    driver: bridge
    external: true

services:
  server:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - LOG_TIMESTAMP_FORMAT=%Y-%m-%d %H:%M:%S.%3f%:z
    networks:
      - caddy
    volumes:
      - ./data:/data/
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
