networks:
  caddy:
    name: caddy
    driver: bridge
    external: true

services:
  glance:
    image: glanceapp/glance:v0.8.5
    container_name: glance
    restart: unless-stopped
    networks:
      - caddy
    volumes:
      - ./config:/app/config
      - ./assets:/app/assets
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
